<div className="flex items-start justify-between gap-4 mb-3"><div><div className="flex items-center gap-2 text-zinc-200 font-medium"><SD s={os.status||"sample"}/>{os.item}</div><div className="text-xs text-zinc-500 mt-0.5">{os.specNotes}</div></div>
<div className="flex gap-2"><button onClick={()=>{const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,ordered:!o.ordered}:o);save({...data,ownerSupplied:u})}} className={"flex items-center gap-1 text-xs px-2 py-1 rounded "+(os.ordered?"bg-emerald-900/30 text-emerald-400 border border-emerald-800/50":"bg-zinc-800 text-zinc-500 border border-zinc-700")}>{os.ordered&&<Ci/>}Ordered</button>
<button onClick={()=>{const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,delivered:!o.delivered}:o);save({...data,ownerSupplied:u})}} className={"flex items-center gap-1 text-xs px-2 py-1 rounded "+(os.delivered?"bg-emerald-900/30 text-emerald-400 border border-emerald-800/50":"bg-zinc-800 text-zinc-500 border border-zinc-700")}>{os.delivered&&<Ci/>}Delivered</button></div></div>
<div className="space-y-2">{os.options.map(op=><div key={op.id} className={"flex items-center gap-3 rounded px-3 py-2 cursor-pointer "+(op.active?"bg-amber-950/20 border border-amber-700/40":"bg-zinc-800/30 border border-zinc-800 hover:border-zinc-700")}
onClick={()=>{const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,options:o.options.map(x=>({...x,active:x.id===op.id}))}:o);save({...data,ownerSupplied:u})}}>
<div className={"w-4 h-4 rounded-full border-2 flex items-center justify-center "+(op.active?"border-amber-400":"border-zinc-600")}>{op.active&&<div className="w-2 h-2 rounded-full bg-amber-400"/>}</div>
<div className="flex-1"><div className="flex items-center gap-2 text-sm text-zinc-300">{op.supplier}{op.description?" — "+op.description:""}<TL t={op.tier}/></div></div>
<div className={"text-sm font-bold tn "+(op.active?"text-amber-300":"text-zinc-500")}>{fmt(op.price)}</div>
{os.options.length>1&&<button onClick={e=>{e.stopPropagation();const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,options:o.options.filter(x=>x.id!==op.id)}:o);save({...data,ownerSupplied:u})}} className="text-zinc-700 hover:text-red-400 text-xs">✕</button>}
</div>)}</div>
<details className="mt-2"><summary className="text-xs text-zinc-600 cursor-pointer hover:text-zinc-400">+ Add real quote</summary>
<div className="flex gap-2 mt-2"><input id={"s"+os.id} placeholder="Supplier" className="flex-1 bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-xs text-zinc-300"/><input id={"d"+os.id} placeholder="Description" className="flex-1 bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-xs text-zinc-300"/><input id={"p"+os.id} type="number" placeholder="Price" className="w-24 bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-xs text-zinc-300 text-right"/>
<button onClick={()=>{const s=document.getElementById("s"+os.id).value;const d=document.getElementById("d"+os.id).value;const p=Number(document.getElementById("p"+os.id).value)||0;if(!s)return;const nid="o"+Date.now();
const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,options:[...o.options,{id:nid,supplier:s,description:d,price:p,active:true,tier:null}].map(x=>({...x,active:x.id===nid}))}:o);save({...data,ownerSupplied:u});
document.getElementById("s"+os.id).value="";document.getElementById("d"+os.id).value="";document.getElementById("p"+os.id).value=""}} className="bg-zinc-700 hover:bg-zinc-600 text-zinc-300 text-xs px-3 py-1 rounded">Add</button></div>
<div className="text-xs text-zinc-600 mt-1">New quote auto-selects as active. You can always switch back to an estimate or any other option above.</div>
</details></Cd>)}
<Cd cn="p-4"><div className="text-xs text-zinc-500 uppercase mb-3">Add New Item</div><div className="flex gap-2"><input value={noi} onChange={e=>setNoi(e.target.value)} placeholder="Item name" className="flex-1 bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 placeholder-zinc-600"/><input value={nos} onChange={e=>setNos(e.target.value)} placeholder="Supplier" className="w-32 bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 placeholder-zinc-600"/><input type="number" value={nop} onChange={e=>setNop(e.target.value)} placeholder="Price" className="w-24 bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 text-right placeholder-zinc-600"/>
<button onClick={()=>{if(!noi.trim())return;save({...data,ownerSupplied:[...data.ownerSupplied,{id:"os"+Date.now(),item:noi.trim(),specNotes:"Manual",status:"confirmed",options:[{id:"o1",supplier:nos.trim()||"TBC",description:"",price:Number(nop)||0,active:true}],ordered:false,delivered:false}]});setNoi("");setNos("");setNop("")}} className="bg-amber-600 hover:bg-amber-500 text-zinc-950 text-sm font-medium px-4 py-2 rounded">Add</button></div></Cd></div>;

const rScen=()=><div className="space-y-4">
<Cd cn="p-4"><div className="text-xs text-zinc-500 uppercase mb-1">Scenarios</div><div className="text-sm text-zinc-400">Based on <strong className="text-zinc-300">{st?st.name:""}</strong></div></Cd>
<div className="grid gap-4 md:grid-cols-2">{scs.map(s=><Cd key={s.id} cn={"p-4 "+(s.ok?"border-emerald-900/40":"border-red-900/40")}>
<div className="flex items-start justify-between mb-3"><div><div className="text-zinc-200 font-medium">{s.name}</div><div className="text-xs text-zinc-500">{s.itemsIncluded.length}/{data.specItems.length} spec · {s.ownerItemsIncluded.length} owner</div></div><div className={"text-xs px-2 py-1 rounded font-medium "+(s.ok?"bg-emerald-900/30 text-emerald-400":"bg-red-900/30 text-red-400")}>{s.ok?"WITHIN":"OVER"}</div></div>
<div className="grid grid-cols-3 gap-3 mb-3"><div><div className="text-xs text-zinc-600">Builder</div><div className="text-sm font-bold tn text-amber-300">{fmt(s.bc)}</div></div><div><div className="text-xs text-zinc-600">Owner</div><div className="text-sm font-bold tn text-blue-300">{fmt(s.oc)}</div></div><div><div className="text-xs text-zinc-600">Total</div><div className={"text-sm font-bold tn "+(s.ok?"text-emerald-400":"text-red-400")}>{fmt(s.tot)}</div></div></div>
<div className="h-2 bg-zinc-800 rounded-full overflow-hidden mb-2"><div className={"h-full rounded-full "+(s.ok?"bg-emerald-500":"bg-red-500")} style={{width:Math.min(100,ba?s.tot/ba*100:0)+"%"}}/></div>
<details className="mt-3"><summary className="text-xs text-zinc-500 cursor-pointer hover:text-zinc-400">Edit items</summary><div className="mt-2 max-h-48 overflow-y-auto space-y-1">{data.specItems.map(si=>{const inc=s.itemsIncluded.includes(si.id);return<label key={si.id} className="flex items-center gap-2 text-xs text-zinc-400 cursor-pointer"><input type="checkbox" checked={inc} onChange={()=>{const ns=data.scenarios.map(x=>x.id!==s.id?x:{...x,itemsIncluded:inc?x.itemsIncluded.filter(id=>id!==si.id):[...x.itemsIncluded,si.id]});save({...data,scenarios:ns})}} className="rounded"/>{si.item}<span className="text-zinc-600 ml-auto tn">{fmt(st&&st.items[si.id]?st.items[si.id].price:0)}</span></label>})}</div></details>
</Cd>)}</div></div>;

const tabs=[{id:"dashboard",l:"Dashboard"},{id:"comparison",l:"Tenders",c:tf.length},{id:"milestones",l:"Milestones",c:data.milestones.filter(m=>m.status!=="paid").length},{id:"owner",l:"Owner Supplied",c:data.ownerSupplied.length},{id:"scenarios",l:"Scenarios",c:data.scenarios.length}];

return<div className="min-h-screen bg-zinc-950 text-zinc-300">
{renderMergeModal()}
{showSet&&<div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4" onClick={()=>setShowSet(false)}><div className="bg-zinc-900 border border-zinc-700 rounded-lg p-6 max-w-md w-full" onClick={e=>e.stopPropagation()}><h3 className="text-lg font-bold text-zinc-100 mb-4">Settings</h3>
<div className="text-sm text-zinc-400 mb-2">Anthropic API Key</div><input type="password" value={ak} onChange={e=>saveAk(e.target.value)} placeholder="sk-ant-..." className="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 mb-4"/>
<div className="text-sm text-zinc-400 mb-2">Estimate Location</div><input value={data.location||""} onChange={e=>save({...data,location:e.target.value})} placeholder="e.g. Surrey, West London" className="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 mb-4"/>
<div className="text-xs text-zinc-600 mb-4">API key stored locally. Location used to tune AI cost estimates to your area.</div>
<button onClick={()=>setShowSet(false)} className="px-4 py-2 bg-zinc-800 text-zinc-300 rounded text-sm hover:bg-zinc-700">Close</button></div></div>}
<div className="border-b border-zinc-800 bg-zinc-950/95 sticky top-0 z-10 backdrop-blur-sm"><div className="max-w-6xl mx-auto px-4">
<div className="flex items-center justify-between py-3"><div className="flex items-center gap-3"><div className="w-8 h-8 rounded bg-amber-500/20 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4 text-amber-400"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg></div><div><h1 className="text-base font-bold text-zinc-100">{data.projectName}</h1><div className="text-xs text-zinc-600">Renovation Tracker · {data.location||"Set location"}</div></div></div>
<div className="flex items-center gap-2"><button onClick={()=>setShowSet(true)} className={"text-xs px-2 py-1 rounded "+(ak?"text-emerald-400 bg-emerald-900/20":"text-amber-400 bg-amber-900/20")}>{ak?"Settings ✓":"Settings"}</button><button onClick={()=>{if(confirm("Reset all data?")){localStorage.removeItem(SK);save(dd)}}} className="text-xs text-zinc-600 hover:text-zinc-400 px-2 py-1 rounded hover:bg-zinc-800">Reset</button></div></div>
<div className="flex gap-0 overflow-x-auto -mb-px">{tabs.map(t=><Tb key={t.id} label={t.l} active={tab===t.id} onClick={()=>setTab(t.id)} count={t.c}/>)}</div>
</div></div>
<div className="max-w-6xl mx-auto px-4 py-6">{tab==="dashboard"&&rDash()}{tab==="comparison"&&rComp()}{tab==="milestones"&&rMile()}{tab==="owner"&&rOwner()}{tab==="scenarios"&&rScen()}</div>
</div>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
