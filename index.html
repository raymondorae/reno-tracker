/* Upload zone */
function UZ({label,desc,files,onAdd,onRemove}){
  const ref=useRef(null);const[drag,setDrag]=useState(false);
  function hf(fl){Array.from(fl).forEach(f=>{if(!f.type.match(/pdf|image\/(png|jpe?g)/))return;const r=new FileReader();r.onload=e=>{onAdd({name:f.name,type:f.type,size:f.size,data:e.target.result,date:new Date().toISOString().slice(0,10)})};r.readAsDataURL(f)})}
  return(
    <div className={"border-2 border-dashed rounded-lg p-6 text-center cursor-pointer transition-all "+(drag?"border-amber-400 bg-amber-950/20":"border-zinc-700 hover:border-zinc-500")}
      onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);hf(e.dataTransfer.files)}} onClick={()=>ref.current&&ref.current.click()}>
      <input ref={ref} type="file" multiple accept=".pdf,image/png,image/jpeg" className="hidden" onChange={e=>hf(e.target.files)}/>
      <div className="text-amber-400 text-2xl mb-2">↑</div>
      <div className="text-zinc-300 font-medium">{label}</div>
      <div className="text-zinc-500 text-sm mt-1">{desc}</div>
      <div className="text-zinc-600 text-xs mt-2">PDF or images · drag & drop or click</div>
      {files.length>0&&<div className="mt-4 space-y-2 text-left" onClick={e=>e.stopPropagation()}>
        {files.map((f,i)=><div key={i} className="flex items-center justify-between bg-zinc-800/50 rounded px-3 py-2">
          <div><div className="text-sm text-zinc-300">{f.builderName?<span className="text-amber-400 mr-2">[{f.builderName}]</span>:null}{f.name}</div><div className="text-xs text-zinc-600">{f.date} · {(f.size/1024).toFixed(0)}KB</div></div>
          <button onClick={()=>onRemove(i)} className="text-zinc-600 hover:text-red-400 text-xs px-2 py-1">Remove</button>
        </div>)}
      </div>}
    </div>
  );
}

/* ═══ MAIN APP ═══ */
function App(){
  /* ALL hooks here, before any conditional return */
  const[data,setData]=useState(null);
  const[tab,setTab]=useState("dashboard");
  const[loading,setLoading]=useState(true);
  const[tbn,setTbn]=useState("");
  const[noi,setNoi]=useState("");const[nos,setNos]=useState("");const[nop,setNop]=useState("");

  const save=useCallback(nd=>{setData(nd);try{localStorage.setItem(SK,JSON.stringify(nd))}catch(e){}},[]);

  useEffect(()=>{
    try{
      const s=localStorage.getItem(SK);
      if(s){const p=JSON.parse(s);if(!p.specDocuments)p.specDocuments=[];if(!p.tenderDocuments)p.tenderDocuments=[];
        if(p.ownerSupplied&&p.ownerSupplied.length>0&&!p.ownerSupplied[0].options){
          p.ownerSupplied=p.ownerSupplied.map(o=>({...o,specNotes:o.notes||o.specNotes||"",options:[{id:"o1",supplier:o.supplier||"TBC",description:"",price:o.budget||0,active:true}]}));
        }
        setData(p)}else{setData(dd)}
    }catch(e){setData(dd)}setLoading(false);
  },[]);

  const st=useMemo(()=>data?data.tenders.find(t=>t.id===data.selectedTender)||data.tenders[0]||null:null,[data]);
  const cv=useMemo(()=>st?Object.values(st.items).reduce((s,i)=>s+(i.included?i.price:0),0):0,[st]);
  const ost=useMemo(()=>data?{budget:data.ownerSupplied.reduce((s,o)=>{const a=o.options.find(x=>x.active);return s+(a?a.price:0)},0)}:{budget:0},[data]);
  const tcp=useMemo(()=>cv+ost.budget,[cv,ost]);
  const tp=useMemo(()=>data?data.milestones.reduce((s,m)=>s+m.paidAmount,0):0,[data]);
  const tf=useMemo(()=>{if(!data)return[];const f=[];data.tenders.forEach(t=>{data.specItems.forEach(si=>{const ti=t.items[si.id];if(!ti||!ti.included)f.push({tender:t.name,tid:t.id,item:si.item,type:"missing",detail:ti?(ti.notes||"Not included"):"Not included"});else if(ti.notes&&ti.notes.length>0)f.push({tender:t.name,tid:t.id,item:si.item,type:"deviation",detail:ti.notes})})});return f},[data]);
  const sc=useMemo(()=>{if(!data||!st)return[];const ca=Math.round(data.totalBudget*data.contingencyPct/100);const ba=data.totalBudget-ca;
    return data.scenarios.map(s=>{const bc=s.itemsIncluded.reduce((x,id)=>{const ti=st.items[id];return x+(ti&&ti.included?ti.price:0)},0);
      const oc=s.ownerItemsIncluded.reduce((x,oid)=>{const o=data.ownerSupplied.find(z=>z.id===oid);if(!o)return x;const a=o.options.find(z=>z.active);return x+(a?a.price:0)},0);
      const tot=bc+oc;return{...s,bc,oc,tot,ok:tot<=ba,sav:tcp-tot}});
  },[data,st,tcp]);

  /* Conditional return AFTER all hooks */
  if(loading||!data)return<div className="min-h-screen bg-zinc-950 flex items-center justify-center"><div className="text-zinc-400 text-lg">Loading...</div></div>;

  const ca=Math.round(data.totalBudget*data.contingencyPct/100);const ba=data.totalBudget-ca;const br=ba-tcp;

  /* ── Dashboard ── */
  const rDash=()=><div className="space-y-6">
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
      {[{l:"Total Budget",v:fmt(data.totalBudget),s:"inc. "+pct(data.contingencyPct)+" contingency",c:"text-zinc-100"},
        {l:"Project Cost",v:fmt(tcp),s:"Builder "+fmt(cv)+" + Owner "+fmt(ost.budget),c:tcp>ba?"text-red-400":"text-emerald-400"},
        {l:"Budget Remaining",v:fmt(br),s:"of "+fmt(ba)+" available",c:br<0?"text-red-400":"text-emerald-400"},
        {l:"Total Paid",v:fmt(tp),s:pct(cv?tp/cv*100:0)+" of contract",c:"text-amber-300"}
      ].map((x,i)=><Card key={i} className="p-4"><div className="text-xs text-zinc-500 uppercase tracking-wider mb-1">{x.l}</div><div className={"text-xl font-bold tn "+x.c}>{x.v}</div><div className="text-xs text-zinc-600 mt-1">{x.s}</div></Card>)}
    </div>
    <Card className="p-4">
      <div className="flex justify-between items-center mb-2"><span className="text-xs text-zinc-500 uppercase tracking-wider">Budget Utilisation</span><span className="text-xs text-zinc-400">{pct(ba?tcp/ba*100:0)} of available</span></div>
      <div className="h-5 bg-zinc-800 rounded-full overflow-hidden flex">
        <div className="bg-amber-500/80 h-full" style={{width:Math.min(100,cv/data.totalBudget*100)+"%"}}/>
        <div className="bg-blue-500/60 h-full" style={{width:Math.min(100-cv/data.totalBudget*100,ost.budget/data.totalBudget*100)+"%"}}/>
        <div className="bg-zinc-700/60 h-full" style={{width:data.contingencyPct+"%"}}/>
      </div>
      <div className="flex gap-4 mt-2 text-xs text-zinc-500">
        <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-amber-500/80"/>Builder</span>
        <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-blue-500/60"/>Owner</span>
        <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-zinc-700/60"/>Contingency</span>
      </div>
    </Card>
    <Card className="p-4">
      <div className="flex items-center justify-between mb-3"><span className="text-xs text-zinc-500 uppercase tracking-wider">Selected Tender</span>
        <select value={data.selectedTender} onChange={e=>save({...data,selectedTender:e.target.value})} className="bg-zinc-800 border border-zinc-700 text-zinc-300 text-sm rounded px-2 py-1">
          {data.tenders.map(t=><option key={t.id} value={t.id}>{t.name} — {fmt(t.totalPrice)}</option>)}
        </select>
      </div>
      {st&&<><div className="text-lg font-bold text-zinc-100">{st.name}</div><div className="text-sm text-zinc-400 mt-1">Quoted: {fmt(st.totalPrice)} · Items total: {fmt(cv)}</div></>}
    </Card>
    {tf.filter(f=>f.tid===data.selectedTender).length>0&&<Card className="p-4">
      <div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">Issues on Selected Tender</div>
      <div className="space-y-2 max-h-48 overflow-y-auto">{tf.filter(f=>f.tid===data.selectedTender).map((f,i)=><div key={i} className={"flex items-start gap-2 text-sm "+(f.type==="missing"?"text-red-400":"text-amber-400")}>{f.type==="missing"?<Xi/>:<Wi/>}<div><span className="font-medium">{f.item}</span><span className="text-zinc-500 ml-2">— {f.detail}</span></div></div>)}</div>
    </Card>}
    <Card className="p-4">
      <div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">Payment Milestones</div>
      <div className="space-y-2">{data.milestones.map(m=>{const d=Math.round(cv*m.pctOfContract/100);const pp=d>0?m.paidAmount/d*100:0;return<div key={m.id} className="flex items-center gap-3"><div className="w-40 text-sm text-zinc-400 truncate">{m.name}</div><div className="flex-1 h-2 bg-zinc-800 rounded-full overflow-hidden"><div className={"h-full rounded-full "+(m.status==="paid"?"bg-emerald-500":m.paidAmount>0?"bg-blue-500":"bg-zinc-700")} style={{width:Math.min(100,pp)+"%"}}/></div><div className="w-20 text-right text-sm tn text-zinc-400">{fmt(d)}</div><Badge status={m.status}/></div>})}</div>
    </Card>
  </div>;

  /* ── Tender Comparison ── */
  const rComp=()=><div className="space-y-4">
    <div className="grid md:grid-cols-2 gap-4">
      <Card className="p-4"><div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">Spec Document</div>
        <UZ label="Upload Spec Document" desc="Your detailed specification that builders quote against" files={data.specDocuments}
          onAdd={f=>save({...data,specDocuments:[...data.specDocuments,f]})} onRemove={i=>save({...data,specDocuments:data.specDocuments.filter((_,j)=>j!==i)})}/>
        {data.specDocuments.length>0&&<button onClick={()=>alert("AI parsing coming soon — upload your spec docs to Claude chat for now")} className="mt-3 w-full py-2 bg-amber-600 hover:bg-amber-500 text-zinc-950 rounded text-sm font-medium">Parse Spec with AI</button>}
      </Card>
      <Card className="p-4"><div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">Builder Tenders</div>
        <div className="flex gap-2 mb-3"><input type="text" value={tbn} onChange={e=>setTbn(e.target.value)} placeholder="Builder name (e.g. Smith & Sons)" className="flex-1 bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 placeholder-zinc-600"/></div>
        <UZ label="Upload Tender Documents" desc={tbn?"Uploading for: "+tbn:"Enter builder name above first"} files={data.tenderDocuments}
          onAdd={f=>{if(!tbn.trim()){alert("Enter builder name first");return}save({...data,tenderDocuments:[...data.tenderDocuments,{...f,builderName:tbn.trim()}]})}}
          onRemove={i=>save({...data,tenderDocuments:data.tenderDocuments.filter((_,j)=>j!==i)})}/>
        {data.tenderDocuments.length>0&&<button onClick={()=>alert("AI parsing coming soon — upload tenders to Claude chat for now")} className="mt-3 w-full py-2 bg-amber-600 hover:bg-amber-500 text-zinc-950 rounded text-sm font-medium">Parse Tenders with AI</button>}
      </Card>
    </div>
    <Card className="p-4"><div className="text-xs text-zinc-500 uppercase tracking-wider mb-1">Spec-to-Tender Comparison Matrix</div><div className="text-sm text-zinc-400 mb-4">Every row from your spec. Flags show deviations or omissions.</div></Card>
    <div className="overflow-x-auto"><table className="w-full text-sm"><thead><tr className="border-b border-zinc-800">
      <th className="text-left py-2 px-3 text-xs text-zinc-500 uppercase w-16">Cat</th>
      <th className="text-left py-2 px-3 text-xs text-zinc-500 uppercase">Spec Item</th>
      <th className="text-left py-2 px-3 text-xs text-zinc-500 uppercase w-28">Notes</th>
      {data.tenders.map(t=><th key={t.id} className={"text-right py-2 px-3 text-xs uppercase w-36 "+(t.id===data.selectedTender?"text-amber-400":"text-zinc-500")}>{t.name.split("—")[0].trim()}</th>)}
    </tr></thead><tbody>
      {CATS.map(cat=>{const items=data.specItems.filter(s=>s.category===cat);if(!items.length)return null;
        return items.map((si,idx)=><tr key={si.id} className={"border-b border-zinc-900/50 hover:bg-zinc-900/40 "+(idx===0?"border-t border-zinc-800":"")}>
          {idx===0&&<td rowSpan={items.length} className="py-2 px-3 text-xs text-zinc-600 uppercase align-top font-medium">{cat}</td>}
          <td className="py-2 px-3 text-zinc-300">{si.item}</td>
          <td className="py-2 px-3 text-zinc-600 text-xs">{si.specNotes}</td>
          {data.tenders.map(t=>{const ti=t.items[si.id];const miss=!ti||!ti.included;const hn=ti&&ti.notes&&ti.notes.length>0;
            return<td key={t.id} className={"py-2 px-3 text-right "+(t.id===data.selectedTender?"bg-amber-950/10":"")}>
              {miss?<div className="flex items-center justify-end gap-1 text-red-400 text-xs"><Xi/><span>MISSING</span></div>
              :<div><div className={"tn "+(hn?"text-amber-300":"text-zinc-300")}>{fmt(ti.price)}</div>
                {hn&&<div className="text-xs text-amber-500/70 mt-0.5 flex items-center justify-end gap-0.5"><Wi/><span className="max-w-28 truncate">{ti.notes}</span></div>}</div>}
            </td>})}
        </tr>)})}
      <tr className="border-t-2 border-zinc-700 font-bold"><td colSpan={2} className="py-3 px-3 text-zinc-300 uppercase text-xs">Totals</td><td/>
        {data.tenders.map(t=>{const tot=Object.values(t.items).reduce((s,i)=>s+(i.included?i.price:0),0);return<td key={t.id} className={"py-3 px-3 text-right tn "+(t.id===data.selectedTender?"text-amber-300":"text-zinc-300")}>{fmt(tot)}</td>})}
      </tr>
    </tbody></table></div>
    <Card className="p-4"><div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">All Flags & Deviations</div>
      <div className="grid gap-2 max-h-72 overflow-y-auto">{tf.map((f,i)=><div key={i} className={"flex items-start gap-2 text-sm rounded px-3 py-2 "+(f.type==="missing"?"bg-red-950/20 border border-red-900/30":"bg-amber-950/20 border border-amber-900/30")}>
        <div className="mt-0.5">{f.type==="missing"?<Xi/>:<Wi/>}</div>
        <div className="flex-1"><span className="text-zinc-400 text-xs">{f.tender}</span><div className={f.type==="missing"?"text-red-300":"text-amber-300"}>{f.item}</div><div className="text-zinc-500 text-xs">{f.detail}</div></div>
      </div>)}</div>
    </Card>
  </div>;

  /* ── Milestones ── */
  const rMile=()=><div className="space-y-4">
    <Card className="p-4">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-1"><span className="text-xs text-zinc-500 uppercase tracking-wider">Milestone Payment Tracker</span><span className="text-sm text-zinc-400">Contract: {fmt(cv)} · Paid: {fmt(tp)} · Remaining: {fmt(cv-tp)}</span></div>
      <div className="h-3 bg-zinc-800 rounded-full overflow-hidden mt-3"><div className="bg-emerald-500 h-full rounded-full" style={{width:(cv?tp/cv*100:0)+"%"}}/></div>
      <div className="text-right text-xs text-zinc-500 mt-1">{pct(cv?tp/cv*100:0)} paid</div>
    </Card>
    {data.milestones.map((m,idx)=>{const d=Math.round(cv*m.pctOfContract/100);return<Card key={m.id} className="p-4">
      <div className="flex items-start justify-between"><div><div className="flex items-center gap-2 flex-wrap"><span className="text-zinc-600 text-xs font-mono">#{idx+1}</span><span className="text-zinc-200 font-medium">{m.name}</span><Badge status={m.status}/></div><div className="text-xs text-zinc-500 mt-1">Due: {m.dueDate} · {m.pctOfContract}%</div></div><div className="text-right"><div className="text-lg font-bold tn text-zinc-200">{fmt(d)}</div><div className="text-xs text-zinc-500">Paid: {fmt(m.paidAmount)}</div></div></div>
      <div className="flex gap-2 mt-3 flex-wrap">{["pending","partial","paid","overdue"].map(s=><button key={s} onClick={()=>{const ms=data.milestones.map(mm=>mm.id===m.id?{...mm,status:s,paidAmount:s==="paid"?d:s==="partial"?Math.round(d*0.5):mm.paidAmount}:mm);save({...data,milestones:ms})}} className={"px-2 py-1 rounded text-xs "+(m.status===s?"bg-zinc-700 text-zinc-200 ring-1 ring-zinc-600":"bg-zinc-900 text-zinc-600 hover:text-zinc-400 hover:bg-zinc-800")}>{s}</button>)}</div>
    </Card>})}
  </div>;

  /* ── Owner Supplied ── */
  const rOwner=()=><div className="space-y-4">
    <Card className="p-4"><div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2"><span className="text-xs text-zinc-500 uppercase tracking-wider">Owner-Supplied Fixtures & Fittings</span><div className="text-sm text-zinc-400">Active total: {fmt(ost.budget)}</div></div></Card>
    {data.ownerSupplied.map(os=>{const ao=os.options.find(o=>o.active);return<Card key={os.id} className="p-4">
      <div className="flex items-start justify-between gap-4 mb-3"><div><div className="text-zinc-200 font-medium">{os.item}</div><div className="text-xs text-zinc-500 mt-0.5">{os.specNotes}</div></div>
        <div className="flex gap-2">
          <button onClick={()=>{const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,ordered:!o.ordered}:o);save({...data,ownerSupplied:u})}} className={"flex items-center gap-1 text-xs px-2 py-1 rounded "+(os.ordered?"bg-emerald-900/30 text-emerald-400 border border-emerald-800/50":"bg-zinc-800 text-zinc-500 border border-zinc-700")}>{os.ordered&&<Ci/>}Ordered</button>
          <button onClick={()=>{const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,delivered:!o.delivered}:o);save({...data,ownerSupplied:u})}} className={"flex items-center gap-1 text-xs px-2 py-1 rounded "+(os.delivered?"bg-emerald-900/30 text-emerald-400 border border-emerald-800/50":"bg-zinc-800 text-zinc-500 border border-zinc-700")}>{os.delivered&&<Ci/>}Delivered</button>
        </div>
      </div>
      <div className="space-y-2">{os.options.map(opt=><div key={opt.id} className={"flex items-center gap-3 rounded px-3 py-2 cursor-pointer "+(opt.active?"bg-amber-950/20 border border-amber-700/40":"bg-zinc-800/30 border border-zinc-800 hover:border-zinc-700")}
        onClick={()=>{const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,options:o.options.map(op=>({...op,active:op.id===opt.id}))}:o);save({...data,ownerSupplied:u})}}>
        <div className={"w-4 h-4 rounded-full border-2 flex items-center justify-center "+(opt.active?"border-amber-400":"border-zinc-600")}>{opt.active&&<div className="w-2 h-2 rounded-full bg-amber-400"/>}</div>
        <div className="flex-1 text-sm text-zinc-300">{opt.supplier}{opt.description?" — "+opt.description:""}</div>
        <div className={"text-sm font-bold tn "+(opt.active?"text-amber-300":"text-zinc-500")}>{fmt(opt.price)}</div>
        {os.options.length>1&&<button onClick={e=>{e.stopPropagation();const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,options:o.options.filter(op=>op.id!==opt.id)}:o);save({...data,ownerSupplied:u})}} className="text-zinc-700 hover:text-red-400 text-xs ml-1">✕</button>}
      </div>)}</div>
      <details className="mt-2"><summary className="text-xs text-zinc-600 cursor-pointer hover:text-zinc-400">+ Add option</summary>
        <div className="flex gap-2 mt-2">
          <input id={"s"+os.id} placeholder="Supplier" className="flex-1 bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-xs text-zinc-300"/>
          <input id={"d"+os.id} placeholder="Description" className="flex-1 bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-xs text-zinc-300"/>
          <input id={"p"+os.id} type="number" placeholder="Price" className="w-24 bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-xs text-zinc-300 text-right"/>
          <button onClick={()=>{const s=document.getElementById("s"+os.id).value;const d=document.getElementById("d"+os.id).value;const p=Number(document.getElementById("p"+os.id).value)||0;if(!s)return;
            const u=data.ownerSupplied.map(o=>o.id===os.id?{...o,options:[...o.options,{id:"o"+Date.now(),supplier:s,description:d,price:p,active:false}]}:o);save({...data,ownerSupplied:u});
            document.getElementById("s"+os.id).value="";document.getElementById("d"+os.id).value="";document.getElementById("p"+os.id).value=""}} className="bg-zinc-700 hover:bg-zinc-600 text-zinc-300 text-xs px-3 py-1 rounded">Add</button>
        </div>
      </details>
    </Card>})}
    <Card className="p-4"><div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">Add New Item</div>
      <div className="flex gap-2"><input value={noi} onChange={e=>setNoi(e.target.value)} placeholder="Item name" className="flex-1 bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 placeholder-zinc-600"/>
        <input value={nos} onChange={e=>setNos(e.target.value)} placeholder="Supplier" className="w-32 bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 placeholder-zinc-600"/>
        <input type="number" value={nop} onChange={e=>setNop(e.target.value)} placeholder="Price" className="w-24 bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-300 text-right placeholder-zinc-600"/>
        <button onClick={()=>{if(!noi.trim())return;save({...data,ownerSupplied:[...data.ownerSupplied,{id:"os"+Date.now(),item:noi.trim(),specNotes:"",options:[{id:"o1",supplier:nos.trim()||"TBC",description:"",price:Number(nop)||0,active:true}],ordered:false,delivered:false}]});setNoi("");setNos("");setNop("")}} className="bg-amber-600 hover:bg-amber-500 text-zinc-950 text-sm font-medium px-4 py-2 rounded">Add</button>
      </div>
    </Card>
  </div>;

  /* ── Scenarios ── */
  const rScen=()=><div className="space-y-4">
    <Card className="p-4"><div className="text-xs text-zinc-500 uppercase tracking-wider mb-1">Scenario Modelling</div><div className="text-sm text-zinc-400">Toggle items per scenario. Based on <strong className="text-zinc-300">{st?st.name:""}</strong>.</div></Card>
    <div className="grid gap-4 md:grid-cols-2">{sc.map(s=><Card key={s.id} className={"p-4 "+(s.ok?"border-emerald-900/40":"border-red-900/40")}>
      <div className="flex items-start justify-between mb-3"><div><div className="text-zinc-200 font-medium">{s.name}</div><div className="text-xs text-zinc-500 mt-0.5">{s.itemsIncluded.length}/{data.specItems.length} spec · {s.ownerItemsIncluded.length} owner</div></div><div className={"text-xs px-2 py-1 rounded font-medium "+(s.ok?"bg-emerald-900/30 text-emerald-400":"bg-red-900/30 text-red-400")}>{s.ok?"WITHIN BUDGET":"OVER BUDGET"}</div></div>
      <div className="grid grid-cols-3 gap-3 mb-3">
        <div><div className="text-xs text-zinc-600">Builder</div><div className="text-sm font-bold tn text-amber-300">{fmt(s.bc)}</div></div>
        <div><div className="text-xs text-zinc-600">Owner</div><div className="text-sm font-bold tn text-blue-300">{fmt(s.oc)}</div></div>
        <div><div className="text-xs text-zinc-600">Total</div><div className={"text-sm font-bold tn "+(s.ok?"text-emerald-400":"text-red-400")}>{fmt(s.tot)}</div></div>
      </div>
      <div className="h-2 bg-zinc-800 rounded-full overflow-hidden mb-2"><div className={"h-full rounded-full "+(s.ok?"bg-emerald-500":"bg-red-500")} style={{width:Math.min(100,ba?s.tot/ba*100:0)+"%"}}/></div>
      <div className="flex justify-between text-xs text-zinc-500"><span>{pct(ba?s.tot/ba*100:0)} of budget</span><span>{s.sav>0?"Saves "+fmt(s.sav):s.sav===0?"Full spec":fmt(Math.abs(s.sav))+" more"}</span></div>
      <div className="mt-3 pt-3 border-t border-zinc-800"><div className="text-xs text-zinc-500 mb-2">Excluded:</div><div className="flex flex-wrap gap-1">
        {data.specItems.filter(si=>!s.itemsIncluded.includes(si.id)).map(si=><span key={si.id} className="text-xs bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded">{si.item}</span>)}
        {data.specItems.filter(si=>!s.itemsIncluded.includes(si.id)).length===0&&<span className="text-xs text-zinc-600 italic">All included</span>}
      </div></div>
      <details className="mt-3"><summary className="text-xs text-zinc-500 cursor-pointer hover:text-zinc-400">Edit items</summary><div className="mt-2 max-h-48 overflow-y-auto space-y-1">
        {data.specItems.map(si=>{const inc=s.itemsIncluded.includes(si.id);return<label key={si.id} className="flex items-center gap-2 text-xs text-zinc-400 cursor-pointer hover:text-zinc-300">
          <input type="checkbox" checked={inc} onChange={()=>{const ns=data.scenarios.map(x=>x.id!==s.id?x:{...x,itemsIncluded:inc?x.itemsIncluded.filter(id=>id!==si.id):[...x.itemsIncluded,si.id]});save({...data,scenarios:ns})}} className="rounded"/>{si.item}<span className="text-zinc-600 ml-auto tn">{fmt(st&&st.items[si.id]?st.items[si.id].price:0)}</span></label>})}
      </div></details>
    </Card>)}</div>
  </div>;

  const tabs=[{id:"dashboard",l:"Dashboard"},{id:"comparison",l:"Tender Comparison",c:tf.length},{id:"milestones",l:"Milestones",c:data.milestones.filter(m=>m.status!=="paid").length},{id:"owner",l:"Owner Supplied",c:data.ownerSupplied.length},{id:"scenarios",l:"Scenarios",c:data.scenarios.length}];

  return<div className="min-h-screen bg-zinc-950 text-zinc-300">
    <div className="border-b border-zinc-800 bg-zinc-950/95 sticky top-0 z-10 backdrop-blur-sm"><div className="max-w-6xl mx-auto px-4">
      <div className="flex items-center justify-between py-3">
        <div className="flex items-center gap-3"><div className="w-8 h-8 rounded bg-amber-500/20 flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4 text-amber-400"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg></div><div><h1 className="text-base font-bold text-zinc-100">{data.projectName}</h1><div className="text-xs text-zinc-600">Renovation Tracker</div></div></div>
        <button onClick={()=>{if(confirm("Reset all data?")){localStorage.removeItem(SK);save(dd)}}} className="text-xs text-zinc-600 hover:text-zinc-400 px-2 py-1 rounded hover:bg-zinc-800">Reset</button>
      </div>
      <div className="flex gap-0 overflow-x-auto -mb-px">{tabs.map(t=><Tab key={t.id} label={t.l} active={tab===t.id} onClick={()=>setTab(t.id)} count={t.c}/>)}</div>
    </div></div>
    <div className="max-w-6xl mx-auto px-4 py-6">
      {tab==="dashboard"&&rDash()}
      {tab==="comparison"&&rComp()}
      {tab==="milestones"&&rMile()}
      {tab==="owner"&&rOwner()}
      {tab==="scenarios"&&rScen()}
    </div>
    <div className="max-w-6xl mx-auto px-4 py-8 border-t border-zinc-900"><p className="text-xs text-zinc-700 text-center">Data saved to browser. Upload spec & tenders to Claude for AI analysis.</p></div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
