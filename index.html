function repairTruncatedJSON(s){
let t=s;
// Handle unclosed string at end
let inStr=false,esc=false;
for(let i=0;i<t.length;i++){if(esc){esc=false;continue}if(t[i]==="\\"&&inStr){esc=true;continue}if(t[i]==='"')inStr=!inStr}
if(inStr){let q=t.lastIndexOf('"');t=t.slice(0,q)}
// Clean trailing partial tokens (comma, colon, whitespace)
t=t.replace(/[,:\s]+$/,"");
// Close open brackets/braces in correct order
const stk=[];inStr=false;esc=false;
for(let i=0;i<t.length;i++){if(esc){esc=false;continue}if(t[i]==="\\"&&inStr){esc=true;continue}if(t[i]==='"'){inStr=!inStr;continue}if(inStr)continue;if(t[i]==="{"||t[i]==="[")stk.push(t[i]);if(t[i]==="}"||t[i]==="]")stk.pop()}
while(stk.length)t+=stk.pop()==="{"?"}":"]";
return t}

function extractJSON(raw){
let s=raw.replace(/```(?:json|JSON)?\s*\n?/g,"").trim();
const fi=Math.min(s.indexOf("{")>=0?s.indexOf("{"):Infinity,s.indexOf("[")>=0?s.indexOf("["):Infinity);
const li=Math.max(s.lastIndexOf("}"),s.lastIndexOf("]"));
if(fi!==Infinity&&li>=fi)s=s.slice(fi,li+1);
try{const r=JSON.parse(s);console.log("extractJSON: parsed on first try");return r}catch(e){}
try{const rep=repairTruncatedJSON(s);const r=JSON.parse(rep);console.warn("extractJSON: parsed after truncation repair — some data may be missing");return r}catch(e){}
const m=raw.match(/\{[\s\S]*\}/);if(m){try{const r=JSON.parse(m[0]);console.log("extractJSON: parsed via regex fallback");return r}catch(e){}
try{const rep=repairTruncatedJSON(m[0]);const r=JSON.parse(rep);console.warn("extractJSON: parsed regex match after repair — some data may be missing");return r}catch(e){}}
const m2=raw.match(/\[[\s\S]*\]/);if(m2)try{return JSON.parse(m2[0])}catch(e){}
console.error("extractJSON failed. Raw response (first 500 chars):",raw.slice(0,500));
throw new Error("JSON parse failed — check browser console for raw AI response")}

function deleteTender(t){if(t.id==="t_est"){if(!confirm('The AI Estimate tender will be regenerated on the next spec parse. Delete it anyway?'))return}else{if(!confirm('Delete tender from "'+t.name+'"? This cannot be undone.'))return}const nt=data.tenders.filter(x=>x.id!==t.id);const sel=data.selectedTender===t.id?(nt[0]?nt[0].id:""):data.selectedTender;save({...data,tenders:nt,selectedTender:sel})}

function updateTenderItem(tid,sid,updates){const nt=data.tenders.map(t=>{if(t.id!==tid)return t;const ci=t.items[sid]||{price:0,included:true,notes:""};return{...t,items:{...t.items,[sid]:{...ci,...updates}}}});save({...data,tenders:nt})}

function renameTenderName(tid,newName){if(!newName.trim())return;const nt=data.tenders.map(t=>t.id===tid?{...t,name:newName.trim()}:t);save({...data,tenders:nt});setRenameTid(null)}
