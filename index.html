    const fmt = (n) => {

      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

      if (doc.mediaType === "application/pdf") {
        return { type: "document", source: { type: "base64", media_type: doc.mediaType, data: doc.base64 } };
      }
      return { type: "image", source: { type: "base64", media_type: doc.mediaType, data: doc.base64 } };
    };

    const callAnthropic = async (apiKey, contentBlocks) => {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "content-type": "application/json",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 8192,
          messages: [{ role: "user", content: contentBlocks }],
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || ("API error " + res.status));
      }
      const json = await res.json();
      const text = json.content.find(c => c.type === "text")?.text || "";
      return text;
    };

    const extractJSON = (text) => {
      const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (fenceMatch) return JSON.parse(fenceMatch[1].trim());
      const braceStart = text.indexOf("{");
      const bracketStart = text.indexOf("[");
      let start = -1;
      if (braceStart === -1) start = bracketStart;
      else if (bracketStart === -1) start = braceStart;
      else start = Math.min(braceStart, bracketStart);
      if (start === -1) throw new Error("No JSON found in response");
      const sub = text.slice(start);
      return JSON.parse(sub);
    };

Extract EVERY line item and categorise them.

Return a JSON object with this EXACT structure:
{
  "specItems": [
    { "id": 1, "category": "CategoryName", "item": "Short item description", "unit": "item|sqm|lm|nr", "qty": 1, "specNotes": "Key details from spec" }

  ]
}

Rules:
- specItems are work the BUILDER does (construction, installation, trades work)
- ownerSupplied are items the HOMEOWNER sources and supplies (kitchen units, appliances, sanitaryware, tiles, doors, handles, light fittings, radiators, worktops \u2014 anything the owner buys and the builder just installs)
- Use these categories for specItems: Demolition, Structural, Electrical, Plumbing, Plastering, Kitchen, Bathrooms, Flooring, Decoration, External, Windows, Roofing, Drainage, Heating, Insulation, Carpentry, General
- IDs for specItems should be sequential integers starting at 1
- IDs for ownerSupplied should be "os1", "os2", etc.
- For ownerSupplied budget, estimate a realistic GBP budget if not stated, or use 0
- Set supplier to "TBC" unless the spec names one
- qty should be a number. If not stated, use 1
- unit should be one of: item, sqm, lm, nr, m, set
- Be thorough \u2014 extract EVERY item mentioned, even minor ones
- specNotes should capture key details, dimensions, material specs, etc.
- Return ONLY valid JSON, no markdown formatting or extra text`;

SPEC ITEMS (the items this tender should be quoting against):
${JSON.stringify(specItems.map(s => ({ id: s.id, category: s.category, item: s.item, specNotes: s.specNotes })), null, 2)}

Return a JSON object with this EXACT structure:
{
  "name": "Builder Name from the document",
  "totalPrice": 0,
  "items": {
    "1": { "price": 4500, "included": true, "notes": "" },
    "2": { "price": 0, "included": false, "notes": "NOT INCLUDED \u2014 reason" }
  }
}

Rules:
- "name" should be the builder/company name from the tender document
- "totalPrice" should be the total quoted price stated in the document (or sum of line items if no total stated)
- The "items" object keys MUST match the spec item IDs above (integers as strings)
- For each spec item, determine if the tender includes it and at what price
- If a tender line item clearly maps to a spec item, include it with the price
- "included" = true if the builder is quoting for this work, false if explicitly excluded or not mentioned
- "notes" should capture:
  - Any deviation from the spec (different materials, different quantities, different scope)
  - If the builder adds caveats, conditions, or exclusions
  - Leave empty "" if the item matches the spec exactly
- Flag deviations like: "Quoted for 40sqm not 45", "uPVC not aluminium", "Excludes X"
- If a spec item is not mentioned at all in the tender, set included: false with notes: "Not mentioned in tender"
- Be precise with prices \u2014 extract exact GBP amounts from the document
- Return ONLY valid JSON, no markdown formatting or extra text`;

      const [data, setData] = useState(null);
      const [activeTab, setActiveTab] = useState("dashboard");
      const [loading, setLoading] = useState(true);

      // API key
      const [apiKey, setApiKey] = useState("");
      const [showApiKeyModal, setShowApiKeyModal] = useState(false);
      const [apiKeyInput, setApiKeyInput] = useState("");

      // Parse state (ephemeral UI only)
      const [specParsing, setSpecParsing] = useState(false);
      const [specParsed, setSpecParsed] = useState(null);
      const [specError, setSpecError] = useState(null);
      const [tenderParsing, setTenderParsing] = useState(false);
      const [tenderParsed, setTenderParsed] = useState(null);
      const [tenderError, setTenderError] = useState(null);

      // Upload UI state
      const [specDragOver, setSpecDragOver] = useState(false);
      const [tenderDragOver, setTenderDragOver] = useState(false);
      const [tenderBuilderName, setTenderBuilderName] = useState("");
      const specInputRef = useRef(null);
      const tenderInputRef = useRef(null);

      useEffect(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            setData(JSON.parse(stored));
          } else {
            setData(defaultData);
          }
        } catch (e) {
          setData(defaultData);
        }
        try {
          const key = localStorage.getItem(API_KEY_STORAGE_KEY);
          if (key) { setApiKey(key); setApiKeyInput(key); }
        } catch (e) {}
        setLoading(false);
      }, []);

      const save = useCallback((newData) => {
        setData(newData);
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(newData));
        } catch (e) {
          console.error("Save failed:", e);
        }
      }, []);

      // --- All useMemo hooks (must be before early return) ---

      const selectedTender = useMemo(() => {
        if (!data) return null;
        if (!data.tenders) return null;
        return data.tenders.find(t => t.id === data.selectedTender) || data.tenders[0] || null;
      }, [data]);

      const contractValue = useMemo(() => {
        if (!selectedTender || !selectedTender.items) return 0;
        return Object.values(selectedTender.items).reduce((s, i) => s + (i.included ? i.price : 0), 0);
      }, [selectedTender]);

      const ownerSuppliedTotal = useMemo(() => {
        if (!data || !data.ownerSupplied) return { budget: 0, actual: 0 };
        return {
          budget: data.ownerSupplied.reduce((s, i) => s + i.budget, 0),
          actual: data.ownerSupplied.reduce((s, i) => s + i.actual, 0),
        };
      }, [data]);

      const activeCats = useMemo(() => {
        if (!data || !data.specItems) return [];
        const cats = [];
        data.specItems.forEach(s => { if (!cats.includes(s.category)) cats.push(s.category); });
        return cats;
      }, [data]);

      const tenderBuilderGroups = useMemo(() => {
        if (!data) return {};
        const groups = {};
        (data.tenderDocuments || []).forEach(d => {
          if (!groups[d.builderName]) groups[d.builderName] = [];
          groups[d.builderName].push(d);
        });
        return groups;
      }, [data]);

      // --- Early return (ALL hooks are above this line) ---

      if (loading || !data) {
        return (
          <div className="min-h-screen bg-zinc-950 flex items-center justify-center">
            <div className="text-zinc-400 text-lg tracking-wide">Loading tracker...</div>
          </div>
        );
      }

      // --- Functions (only needed when data is loaded) ---

      const saveApiKey = (key) => {
        setApiKey(key);
        try { localStorage.setItem(API_KEY_STORAGE_KEY, key); } catch (e) {}
        setShowApiKeyModal(false);
      };

      // --- Document management ---

      const addSpecDocs = async (files) => {
        const newDocs = [];
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const b64 = await fileToBase64(file);
          newDocs.push({
            id: "sd" + Date.now() + i,
            filename: file.name,
            dateUploaded: new Date().toISOString().split("T")[0],
            base64: b64,
            mediaType: file.type || "application/pdf",
          });
        }
        const updated = { ...data, specDocuments: [...(data.specDocuments || []), ...newDocs] };
        save(updated);
        setSpecParsed(null);
        setSpecError(null);
      };

      const removeSpecDoc = (id) => {
        save({ ...data, specDocuments: (data.specDocuments || []).filter(d => d.id !== id) });
        setSpecParsed(null);
      };

      const addTenderDocs = async (files, builderName) => {
        const newDocs = [];
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const b64 = await fileToBase64(file);
          newDocs.push({
            id: "td" + Date.now() + i,
            builderName: builderName,
            filename: file.name,
            dateUploaded: new Date().toISOString().split("T")[0],
            base64: b64,
            mediaType: file.type || "application/pdf",
          });
        }
        const updated = { ...data, tenderDocuments: [...(data.tenderDocuments || []), ...newDocs] };
        save(updated);
        setTenderParsed(null);
        setTenderError(null);
      };

      const removeTenderDoc = (id) => {
        save({ ...data, tenderDocuments: (data.tenderDocuments || []).filter(d => d.id !== id) });
        setTenderParsed(null);
      };

      // --- AI Parse Handlers ---

      const handleParseSpec = async () => {
        if (!apiKey) { setShowApiKeyModal(true); return; }
        const docs = data.specDocuments || [];
        if (docs.length === 0) return;
        setSpecParsing(true);
        setSpecError(null);
        try {
          const contentBlocks = docs.map(docToContentBlock);
          contentBlocks.push({ type: "text", text: SPEC_PARSE_PROMPT });
          const rawText = await callAnthropic(apiKey, contentBlocks);
          const parsed = extractJSON(rawText);

          if (!parsed.specItems || !Array.isArray(parsed.specItems)) {
            throw new Error("AI response missing specItems array");
          }

          const specItems = parsed.specItems.map((s, i) => ({
            id: i + 1,
            category: s.category || "General",
            item: s.item || "Unnamed item",
            unit: s.unit || "item",
            qty: Number(s.qty) || 1,
            specNotes: s.specNotes || "",
          }));

          const ownerSupplied = (parsed.ownerSupplied || []).map((o, i) => ({
            id: "os" + (i + 1),
            item: o.item || "Unnamed item",
            supplier: o.supplier || "TBC",
            budget: Number(o.budget) || 0,
            actual: Number(o.actual) || 0,
            ordered: false,
            delivered: false,
            notes: o.notes || "",
          }));

          const allSpecIds = specItems.map(s => s.id);
          const allOwnerIds = ownerSupplied.map(o => o.id);
          const newScenarios = [{
            id: "s1", name: "Full spec as planned",
            itemsIncluded: allSpecIds, ownerItemsIncluded: allOwnerIds, active: true,
          }];

          save({
            ...data, specItems, ownerSupplied, scenarios: newScenarios,
            tenders: [], selectedTender: "",
          });
          setSpecParsed(specItems.length + " spec items + " + ownerSupplied.length + " owner-supplied items extracted");
        } catch (e) {
          console.error("Spec parse error:", e);
          setSpecError(e.message || "Failed to parse document");
        } finally {
          setSpecParsing(false);
        }
      };

      const handleParseTenders = async () => {
        if (!apiKey) { setShowApiKeyModal(true); return; }
        const docs = data.tenderDocuments || [];
        if (docs.length === 0) return;
        if (!data.specItems || data.specItems.length === 0) {
          setTenderError("Upload and parse your spec document first \u2014 tenders are mapped against spec items.");
          return;
        }
        setTenderParsing(true);
        setTenderError(null);
        try {
          // Group docs by builder
          const builderGroups = {};
          docs.forEach(d => {
            if (!builderGroups[d.builderName]) builderGroups[d.builderName] = [];
            builderGroups[d.builderName].push(d);
          });

          let newTenders = [...data.tenders];
          let tendersAdded = 0;

          for (const [builderName, builderDocs] of Object.entries(builderGroups)) {
            const contentBlocks = builderDocs.map(docToContentBlock);
            contentBlocks.push({ type: "text", text: buildTenderParsePrompt(data.specItems) });
            const rawText = await callAnthropic(apiKey, contentBlocks);
            const parsed = extractJSON(rawText);

            if (!parsed.items || typeof parsed.items !== "object") {
              throw new Error("AI response missing items object for " + builderName);
            }

            const tenderItems = {};
            data.specItems.forEach(si => {
              const raw = parsed.items[String(si.id)];
              if (raw) {
                tenderItems[si.id] = {
                  price: Number(raw.price) || 0,
                  included: raw.included !== false,
                  notes: raw.notes || "",
                };
              } else {
                tenderItems[si.id] = { price: 0, included: false, notes: "Not mentioned in tender" };
              }
            });

            const tenderId = "t" + (Date.now() + tendersAdded);
            const tenderName = parsed.name || builderName;
            const total = Number(parsed.totalPrice) || Object.values(tenderItems).reduce((s, i) => s + (i.included ? i.price : 0), 0);

            newTenders.push({
              id: tenderId, name: tenderName,
              submitted: new Date().toISOString().split("T")[0],
              totalPrice: total, items: tenderItems,
            });
            tendersAdded++;
          }

          save({
            ...data, tenders: newTenders,
            selectedTender: data.selectedTender || newTenders[0]?.id || "",
          });
          setTenderParsed(tendersAdded + " tender" + (tendersAdded !== 1 ? "s" : "") + " parsed and added");
        } catch (e) {
          console.error("Tender parse error:", e);
          setTenderError(e.message || "Failed to parse tender");
        } finally {
          setTenderParsing(false);
        }
      };

      // --- Computed values (not hooks, safe after early return) ---

      const specDocs = data.specDocuments || [];
      const tenderDocs = data.tenderDocuments || [];
      const totalProjectCost = contractValue + ownerSuppliedTotal.budget;
      const contingencyAmount = Math.round(data.totalBudget * data.contingencyPct / 100);
      const budgetAvailable = data.totalBudget - contingencyAmount;
      const budgetRemaining = budgetAvailable - totalProjectCost;
      const totalPaid = data.milestones.reduce((s, m) => s + m.paidAmount, 0);

      const tenderFlags = [];
      data.tenders.forEach(t => {
        data.specItems.forEach(si => {
          const ti = t.items[si.id];
          if (!ti || !ti.included) {
            tenderFlags.push({ tender: t.name, tenderId: t.id, item: si.item, itemId: si.id, type: "missing", detail: ti ? ti.notes || "Not included in tender" : "Not included in tender" });
          } else if (ti.notes && ti.notes.length > 0) {
            tenderFlags.push({ tender: t.name, tenderId: t.id, item: si.item, itemId: si.id, type: "deviation", detail: ti.notes });
          }
        });
      });

      const scenarioCosts = data.scenarios.map(sc => {
        const builderCost = sc.itemsIncluded.reduce((s, itemId) => {
          const ti = selectedTender ? selectedTender.items[itemId] : null;
          return s + (ti && ti.included ? ti.price : 0);
        }, 0);
        const ownerCost = sc.ownerItemsIncluded.reduce((s, osId) => {
          const os = data.ownerSupplied.find(o => o.id === osId);
          return s + (os ? os.budget : 0);
        }, 0);
        const total = builderCost + ownerCost;
        const withinBudget = total <= budgetAvailable;
        const savings = totalProjectCost - total;
        return { ...sc, builderCost, ownerCost, total, withinBudget, savings };
      });

      // --- Drop handlers ---

      const handleSpecDrop = (e) => {
        e.preventDefault();
        setSpecDragOver(false);
        const files = Array.from(e.dataTransfer.files);
        if (files.length > 0) addSpecDocs(files);
      };

      const handleSpecSelect = (e) => {
        const files = Array.from(e.target.files);
        if (files.length > 0) addSpecDocs(files);
        e.target.value = "";
      };

      const handleTenderDrop = (e) => {
        e.preventDefault();
        setTenderDragOver(false);
        const name = tenderBuilderName.trim();
        if (!name) { setTenderError("Enter a builder name before uploading files."); return; }
        const files = Array.from(e.dataTransfer.files);
        if (files.length > 0) addTenderDocs(files, name);
      };

      const handleTenderSelect = (e) => {
        const name = tenderBuilderName.trim();
        if (!name) { setTenderError("Enter a builder name before uploading files."); e.target.value = ""; return; }
        const files = Array.from(e.target.files);
        if (files.length > 0) addTenderDocs(files, name);
        e.target.value = "";
      };

      // --- Render Tabs ---

      const renderDashboard = () => (
        <div className="space-y-6">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[
              { label: "Total Budget", value: fmt(data.totalBudget), sub: "inc. " + pct(data.contingencyPct) + " contingency", color: "text-zinc-100" },
              { label: "Project Cost", value: fmt(totalProjectCost), sub: "Builder " + fmt(contractValue) + " + Owner " + fmt(ownerSuppliedTotal.budget), color: totalProjectCost > budgetAvailable ? "text-red-400" : "text-emerald-400" },
              { label: "Budget Remaining", value: fmt(budgetRemaining), sub: "of " + fmt(budgetAvailable) + " available", color: budgetRemaining < 0 ? "text-red-400" : "text-emerald-400" },
              { label: "Total Paid", value: fmt(totalPaid), sub: pct(contractValue ? totalPaid / contractValue * 100 : 0) + " of contract", color: "text-amber-300" },
            ].map((c, i) => (
              <Card key={i} className="p-4">
                <div className="text-xs text-zinc-500 uppercase tracking-wider mb-1">{c.label}</div>
                <div className={"text-xl font-bold tabular-nums " + c.color}>{c.value}</div>
                <div className="text-xs text-zinc-600 mt-1">{c.sub}</div>
              </Card>
            ))}
          </div>

          <Card className="p-4">
            <div className="flex justify-between items-center mb-2">
              <span className="text-xs text-zinc-500 uppercase tracking-wider">Budget Utilisation</span>
              <span className="text-xs text-zinc-400">{pct(budgetAvailable ? totalProjectCost / budgetAvailable * 100 : 0)} of available budget</span>
            </div>
            <div className="h-5 bg-zinc-800 rounded-full overflow-hidden flex">
              <div className="bg-amber-500/80 h-full transition-all" style={{ width: Math.min(100, contractValue / data.totalBudget * 100) + "%" }} />
              <div className="bg-blue-500/60 h-full transition-all" style={{ width: Math.min(100 - contractValue / data.totalBudget * 100, ownerSuppliedTotal.budget / data.totalBudget * 100) + "%" }} />
              <div className="bg-zinc-700/60 h-full transition-all" style={{ width: data.contingencyPct + "%" }} />
            </div>
            <div className="flex gap-4 mt-2 text-xs text-zinc-500">
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-amber-500/80" />Builder Contract</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-blue-500/60" />Owner Supplied</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-zinc-700/60" />Contingency</span>
            </div>
          </Card>

          {selectedTender && (
            <Card className="p-4">
              <div className="flex items-center justify-between mb-3">
                <span className="text-xs text-zinc-500 uppercase tracking-wider">Selected Tender</span>
                <select value={data.selectedTender} onChange={e => save({ ...data, selectedTender: e.target.value })}
                  className="bg-zinc-800 border border-zinc-700 text-zinc-300 text-sm rounded px-2 py-1">
                  {data.tenders.map(t => <option key={t.id} value={t.id}>{t.name} \u2014 {fmt(t.totalPrice)}</option>)}
                </select>
              </div>
              <div className="text-lg font-bold text-zinc-100">{selectedTender.name}</div>
              <div className="text-sm text-zinc-400 mt-1">Quoted: {fmt(selectedTender.totalPrice)} \u00b7 Line items total: {fmt(contractValue)}</div>
            </Card>
          )}

          {!selectedTender && data.tenders.length === 0 && (
            <Card className="p-4">
              <div className="text-sm text-zinc-400">No tenders loaded yet. Go to the <button onClick={() => setActiveTab("comparison")} className="text-amber-400 underline">Tender Comparison</button> tab to upload your spec and builder tenders.</div>
            </Card>
          )}

          {tenderFlags.filter(f => f.tenderId === (data.selectedTender || "")).length > 0 && (
            <Card className="p-4">
              <div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">Issues on Selected Tender</div>
              <div className="space-y-2 max-h-48 overflow-y-auto">
                {tenderFlags.filter(f => f.tenderId === data.selectedTender).map((f, i) => (
                  <div key={i} className={"flex items-start gap-2 text-sm " + (f.type === "missing" ? "text-red-400" : "text-amber-400")}>
                    {f.type === "missing" ? <XIcon /> : <WarningIcon />}
                    <div><span className="font-medium">{f.item}</span><span className="text-zinc-500 ml-2">\u2014 {f.detail}</span></div>
                  </div>
                ))}
              </div>
            </Card>
          )}

          <Card className="p-4">
            <div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">Payment Milestones</div>
            <div className="space-y-2">
              {data.milestones.map(m => {
                const due = Math.round(contractValue * m.pctOfContract / 100);
                const paidPct = due > 0 ? m.paidAmount / due * 100 : 0;
                return (
                  <div key={m.id} className="flex items-center gap-3">
                    <div className="w-40 text-sm text-zinc-400 truncate">{m.name}</div>
                    <div className="flex-1 h-2 bg-zinc-800 rounded-full overflow-hidden">
                      <div className={"h-full rounded-full " + (m.status === "paid" ? "bg-emerald-500" : m.paidAmount > 0 ? "bg-blue-500" : "bg-zinc-700")} style={{ width: Math.min(100, paidPct) + "%" }} />
                    </div>
                    <div className="w-20 text-right text-sm tabular-nums text-zinc-400">{fmt(due)}</div>
                    <StatusBadge status={m.status} />
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      );

      const renderComparison = () => (
        <div className="space-y-4">
          {/* Upload Documents */}
          <Card className="p-5">
            <div className="text-xs text-zinc-500 uppercase tracking-wider mb-1">Upload Documents</div>
            <div className="text-sm text-zinc-400 mb-4">Upload your spec document and builder tenders. AI will parse them into structured data automatically.</div>

            {!apiKey && (
              <div className="bg-amber-950/20 border border-amber-900/30 rounded-lg p-3 mb-4 flex items-center gap-2">
                <WarningIcon />
                <span className="text-sm text-amber-300">Set your Anthropic API key first.</span>
                <button onClick={() => { setApiKeyInput(apiKey); setShowApiKeyModal(true); }}
                  className="ml-auto text-xs bg-amber-600 hover:bg-amber-500 text-zinc-950 font-medium px-3 py-1 rounded">Set API Key</button>
              </div>
            )}

            <div className="grid md:grid-cols-2 gap-6">
              {/* --- Spec Document Upload --- */}
              <div>
                <div className="text-xs text-zinc-500 uppercase tracking-wider mb-2">Spec Document</div>
                <div
                  onDragOver={e => { e.preventDefault(); setSpecDragOver(true); }}
                  onDragLeave={() => setSpecDragOver(false)}
                  onDrop={handleSpecDrop}
                  onClick={() => specInputRef.current?.click()}
                  className={"border-2 border-dashed rounded-lg p-4 text-center cursor-pointer transition-all " +
                    (specDragOver ? "border-amber-500 bg-amber-950/20" : "border-zinc-700 hover:border-zinc-500 hover:bg-zinc-900/50")}
                >
                  <div className="flex justify-center mb-1 text-zinc-500"><UploadIcon /></div>
                  <div className="text-sm text-zinc-400">Drop files here or click to browse</div>
                  <div className="text-xs text-zinc-600 mt-1">PDF, JPG, or PNG \u2014 multiple files OK</div>
                  <input ref={specInputRef} type="file" accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png" onChange={handleSpecSelect} className="hidden" multiple />
                </div>

                {specDocs.length > 0 && (
                  <div className="mt-3 space-y-1">
                    {specDocs.map(doc => (
                      <div key={doc.id} className="flex items-center gap-2 text-sm bg-zinc-800/50 rounded px-3 py-1.5">
                        <DocIcon />
                        <span className="truncate flex-1 text-zinc-300">{doc.filename}</span>
                        <span className="text-xs text-zinc-600 whitespace-nowrap">{doc.dateUploaded}</span>
                        <button onClick={() => removeSpecDoc(doc.id)} className="text-zinc-600 hover:text-red-400 transition-colors ml-1" title="Remove">
                          <XIcon />
                        </button>
                      </div>
                    ))}
                  </div>
                )}

                {specError && (
                  <div className="text-xs text-red-400 mt-2 bg-red-950/20 border border-red-900/30 rounded px-3 py-2">{specError}</div>
                )}
                {specParsed && (
                  <div className="mt-2 border border-emerald-800/50 bg-emerald-950/20 rounded px-3 py-2 flex items-center gap-2 text-sm text-emerald-400">
                    <CheckIcon /><span>{specParsed}</span>
                  </div>
                )}

                {specDocs.length > 0 && (
                  <button onClick={handleParseSpec} disabled={specParsing}
                    className={"mt-3 w-full flex items-center justify-center gap-2 px-4 py-2 rounded text-sm font-medium transition-all " +
                      (specParsing ? "bg-zinc-700 text-zinc-400 cursor-wait" : "bg-amber-600 hover:bg-amber-500 text-zinc-950")}>
                    {specParsing ? <><Spinner size="w-4 h-4" /> Parsing {specDocs.length} file{specDocs.length !== 1 ? "s" : ""} with AI...</> : "Parse spec with AI (" + specDocs.length + " file" + (specDocs.length !== 1 ? "s" : "") + ")"}
                  </button>
                )}
              </div>

              {/* --- Builder Tender Upload --- */}
              <div>
                <div className="text-xs text-zinc-500 uppercase tracking-wider mb-2">Builder Tenders</div>
                <input
                  type="text"
                  value={tenderBuilderName}
                  onChange={e => setTenderBuilderName(e.target.value)}
                  placeholder="Builder name (e.g. Smith & Sons)"
                  className="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-amber-500 mb-2"
                />
                <div
                  onDragOver={e => { e.preventDefault(); setTenderDragOver(true); }}
                  onDragLeave={() => setTenderDragOver(false)}
                  onDrop={handleTenderDrop}
                  onClick={() => { if (tenderBuilderName.trim()) tenderInputRef.current?.click(); else setTenderError("Enter a builder name before uploading files."); }}
                  className={"border-2 border-dashed rounded-lg p-4 text-center cursor-pointer transition-all " +
                    (tenderDragOver ? "border-amber-500 bg-amber-950/20" : "border-zinc-700 hover:border-zinc-500 hover:bg-zinc-900/50")}
                >
                  <div className="flex justify-center mb-1 text-zinc-500"><UploadIcon /></div>
                  <div className="text-sm text-zinc-400">Drop files here or click to browse</div>
                  <div className="text-xs text-zinc-600 mt-1">PDF, JPG, or PNG \u2014 multiple files per builder</div>
                  <input ref={tenderInputRef} type="file" accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png" onChange={handleTenderSelect} className="hidden" multiple />
                </div>

                {Object.keys(tenderBuilderGroups).length > 0 && (
                  <div className="mt-3 space-y-3">
                    {Object.entries(tenderBuilderGroups).map(([builder, docs]) => (
                      <div key={builder}>
                        <div className="text-xs text-amber-400 font-medium mb-1">{builder}</div>
                        <div className="space-y-1">
                          {docs.map(doc => (
                            <div key={doc.id} className="flex items-center gap-2 text-sm bg-zinc-800/50 rounded px-3 py-1.5">
                              <DocIcon />
                              <span className="truncate flex-1 text-zinc-300">{doc.filename}</span>
                              <span className="text-xs text-zinc-600 whitespace-nowrap">{doc.dateUploaded}</span>
                              <button onClick={() => removeTenderDoc(doc.id)} className="text-zinc-600 hover:text-red-400 transition-colors ml-1" title="Remove">
                                <XIcon />
                              </button>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {tenderError && (
                  <div className="text-xs text-red-400 mt-2 bg-red-950/20 border border-red-900/30 rounded px-3 py-2">{tenderError}</div>
                )}
                {tenderParsed && (
                  <div className="mt-2 border border-emerald-800/50 bg-emerald-950/20 rounded px-3 py-2 flex items-center gap-2 text-sm text-emerald-400">
                    <CheckIcon /><span>{tenderParsed}</span>
                  </div>
                )}

                {tenderDocs.length > 0 && (
                  <button onClick={handleParseTenders} disabled={tenderParsing}
                    className={"mt-3 w-full flex items-center justify-center gap-2 px-4 py-2 rounded text-sm font-medium transition-all " +
                      (tenderParsing ? "bg-zinc-700 text-zinc-400 cursor-wait" : "bg-amber-600 hover:bg-amber-500 text-zinc-950")}>
                    {tenderParsing ? <><Spinner size="w-4 h-4" /> Parsing {Object.keys(tenderBuilderGroups).length} tender{Object.keys(tenderBuilderGroups).length !== 1 ? "s" : ""} with AI...</> : "Parse all tenders with AI (" + Object.keys(tenderBuilderGroups).length + " builder" + (Object.keys(tenderBuilderGroups).length !== 1 ? "s" : "") + ")"}
                  </button>
                )}
              </div>
            </div>
          </Card>

          {/* Comparison Matrix */}
          {data.specItems.length > 0 && data.tenders.length > 0 && (
            <>
              <Card className="p-4">
                <div className="text-xs text-zinc-500 uppercase tracking-wider mb-1">Spec-to-Tender Comparison Matrix</div>
                <div className="text-sm text-zinc-400 mb-4">Every row is a line from your spec. Flags show where a tender deviates or omits.</div>
              </Card>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-zinc-800">
                      <th className="text-left py-2 px-3 text-xs text-zinc-500 uppercase tracking-wider w-16">Cat</th>
                      <th className="text-left py-2 px-3 text-xs text-zinc-500 uppercase tracking-wider">Spec Item</th>
                      <th className="text-left py-2 px-3 text-xs text-zinc-500 uppercase tracking-wider w-28">Spec Notes</th>
                      {data.tenders.map(t => (
                        <th key={t.id} className={"text-right py-2 px-3 text-xs uppercase tracking-wider w-36 " + (t.id === data.selectedTender ? "text-amber-400" : "text-zinc-500")}>
                          {t.name.split("\u2014")[0].split("—")[0].trim()}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {activeCats.map(cat => {
                      const items = data.specItems.filter(s => s.category === cat);
                      if (items.length === 0) return null;
                      return items.map((si, idx) => (
                        <tr key={si.id} className={"border-b border-zinc-900/50 hover:bg-zinc-900/40 " + (idx === 0 ? "border-t border-zinc-800" : "")}>
                          {idx === 0 && (
                            <td rowSpan={items.length} className="py-2 px-3 text-xs text-zinc-600 uppercase tracking-wider align-top font-medium">{cat}</td>
                          )}
                          <td className="py-2 px-3 text-zinc-300">{si.item}</td>
                          <td className="py-2 px-3 text-zinc-600 text-xs">{si.specNotes}</td>
                          {data.tenders.map(t => {
                            const ti = t.items[si.id];
                            const isMissing = !ti || !ti.included;
                            const hasNote = ti && ti.notes && ti.notes.length > 0;
                            return (
                              <td key={t.id} className={"py-2 px-3 text-right " + (t.id === data.selectedTender ? "bg-amber-950/10" : "")}>
                                {isMissing ? (
                                  <div className="flex items-center justify-end gap-1 text-red-400 text-xs"><XIcon /><span>MISSING</span></div>
                                ) : (
                                  <div>
                                    <div className={"tabular-nums " + (hasNote ? "text-amber-300" : "text-zinc-300")}>{fmt(ti.price)}</div>
                                    {hasNote && (
                                      <div className="text-xs text-amber-500/70 mt-0.5 flex items-center justify-end gap-0.5">
                                        <WarningIcon /><span className="max-w-28 truncate">{ti.notes}</span>
                                      </div>
                                    )}
                                  </div>
                                )}
                              </td>
                            );
                          })}
                        </tr>
                      ));
                    })}
                    <tr className="border-t-2 border-zinc-700 font-bold">
                      <td colSpan={2} className="py-3 px-3 text-zinc-300 uppercase text-xs tracking-wider">Totals (included items only)</td>
                      <td></td>
                      {data.tenders.map(t => {
                        const total = Object.values(t.items).reduce((s, i) => s + (i.included ? i.price : 0), 0);
                        return (
                          <td key={t.id} className={"py-3 px-3 text-right tabular-nums " + (t.id === data.selectedTender ? "text-amber-300" : "text-zinc-300")}>{fmt(total)}</td>
                        );
                      })}
                    </tr>
                  </tbody>
                </table>
              </div>

              <Card className="p-4">
                <div className="text-xs text-zinc-500 uppercase tracking-wider mb-3">All Flags & Deviations</div>
                {tenderFlags.length > 0 ? (
                  <div className="grid gap-2 max-h-72 overflow-y-auto">
                    {tenderFlags.map((f, i) => (
                      <div key={i} className={"flex items-start gap-2 text-sm rounded px-3 py-2 " + (f.type === "missing" ? "bg-red-950/20 border border-red-900/30" : "bg-amber-950/20 border border-amber-900/30")}>
                        <div className="mt-0.5">{f.type === "missing" ? <XIcon /> : <WarningIcon />}</div>
                        <div className="flex-1">
                          <span className="text-zinc-400 text-xs">{f.tender}</span>
                          <div className={f.type === "missing" ? "text-red-300" : "text-amber-300"}>{f.item}</div>
                          <div className="text-zinc-500 text-xs">{f.detail}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="text-sm text-zinc-500 italic">No deviations or omissions found.</div>
                )}
              </Card>
            </>
          )}

          {data.specItems.length > 0 && data.tenders.length === 0 && (
            <Card className="p-6 text-center">
              <div className="text-zinc-400 text-sm">Spec loaded with {data.specItems.length} items. Upload builder tenders above to generate the comparison matrix.</div>
            </Card>
          )}

          {data.specItems.length === 0 && (
            <Card className="p-6 text-center">
              <div className="text-zinc-400 text-sm">Upload your spec document above to get started. AI will extract all line items automatically.</div>
            </Card>
          )}
        </div>
      );

      const renderMilestones = () => (
        <div className="space-y-4">
          <Card className="p-4">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-1 gap-2">
              <span className="text-xs text-zinc-500 uppercase tracking-wider">Milestone Payment Tracker</span>
              <span className="text-sm text-zinc-400">Contract: {fmt(contractValue)} \u00b7 Paid: {fmt(totalPaid)} \u00b7 Remaining: {fmt(contractValue - totalPaid)}</span>
            </div>
            <div className="h-3 bg-zinc-800 rounded-full overflow-hidden mt-3">
              <div className="bg-emerald-500 h-full rounded-full transition-all" style={{ width: (contractValue ? totalPaid / contractValue * 100 : 0) + "%" }} />
            </div>
            <div className="text-right text-xs text-zinc-500 mt-1">{pct(contractValue ? totalPaid / contractValue * 100 : 0)} paid</div>
          </Card>

          <div className="space-y-3">
            {data.milestones.map((m, idx) => {
              const due = Math.round(contractValue * m.pctOfContract / 100);
              return (
                <Card key={m.id} className="p-4">
                  <div className="flex items-start justify-between">
                    <div>
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-zinc-600 text-xs font-mono">#{idx + 1}</span>
                        <span className="text-zinc-200 font-medium">{m.name}</span>
                        <StatusBadge status={m.status} />
                      </div>
                      <div className="text-xs text-zinc-500 mt-1">Due: {m.dueDate} \u00b7 {m.pctOfContract}% of contract</div>
                    </div>
                    <div className="text-right">
                      <div className="text-lg font-bold tabular-nums text-zinc-200">{fmt(due)}</div>
                      <div className="text-xs text-zinc-500">Paid: {fmt(m.paidAmount)}</div>
                    </div>
                  </div>
                  <div className="flex gap-2 mt-3 flex-wrap">
                    {["pending", "partial", "paid", "overdue"].map(st => (
                      <button key={st} onClick={() => {
                        const newMilestones = data.milestones.map(mm =>
                          mm.id === m.id ? { ...mm, status: st, paidAmount: st === "paid" ? due : st === "partial" ? Math.round(due * 0.5) : mm.paidAmount } : mm
                        );
                        save({ ...data, milestones: newMilestones });
                      }}
                        className={"px-2 py-1 rounded text-xs transition-all " +
                          (m.status === st ? "bg-zinc-700 text-zinc-200 ring-1 ring-zinc-600" : "bg-zinc-900 text-zinc-600 hover:text-zinc-400 hover:bg-zinc-800")}>
                        {st}
                      </button>
                    ))}
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );

      const renderOwnerSupplied = () => (
        <div className="space-y-4">
          <Card className="p-4">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
              <span className="text-xs text-zinc-500 uppercase tracking-wider">Owner-Supplied Fixtures & Fittings</span>
              <div className="text-sm text-zinc-400">Budget: {fmt(ownerSuppliedTotal.budget)} \u00b7 Spent: {fmt(ownerSuppliedTotal.actual)}</div>
            </div>
          </Card>
          <div className="space-y-3">
            {data.ownerSupplied.map(os => (
              <Card key={os.id} className="p-4">
                <div className="flex items-start justify-between gap-4">
                  <div className="flex-1">
                    <div className="text-zinc-200 font-medium">{os.item}</div>
                    <div className="text-xs text-zinc-500 mt-0.5">{os.supplier} \u00b7 {os.notes}</div>
                    <div className="flex gap-3 mt-2">
                      <button onClick={() => {
                        const updated = data.ownerSupplied.map(o => o.id === os.id ? { ...o, ordered: !o.ordered } : o);
                        save({ ...data, ownerSupplied: updated });
                      }}
                        className={"flex items-center gap-1 text-xs px-2 py-1 rounded " +
                          (os.ordered ? "bg-emerald-900/30 text-emerald-400 border border-emerald-800/50" : "bg-zinc-800 text-zinc-500 border border-zinc-700")}>
                        {os.ordered ? <CheckIcon /> : null} Ordered
                      </button>
                      <button onClick={() => {
                        const updated = data.ownerSupplied.map(o => o.id === os.id ? { ...o, delivered: !o.delivered } : o);
                        save({ ...data, ownerSupplied: updated });
                      }}
                        className={"flex items-center gap-1 text-xs px-2 py-1 rounded " +
                          (os.delivered ? "bg-emerald-900/30 text-emerald-400 border border-emerald-800/50" : "bg-zinc-800 text-zinc-500 border border-zinc-700")}>
                        {os.delivered ? <CheckIcon /> : null} Delivered
                      </button>
                    </div>
                  </div>
                  <div className="text-right">
                    <div className="text-xs text-zinc-500">Budget</div>
                    <div className="text-zinc-200 font-bold tabular-nums">{fmt(os.budget)}</div>
                    <div className="text-xs text-zinc-500 mt-2">Actual</div>
                    <input type="number" value={os.actual || ""} placeholder="0"
                      onChange={e => {
                        const updated = data.ownerSupplied.map(o => o.id === os.id ? { ...o, actual: Number(e.target.value) || 0 } : o);
                        save({ ...data, ownerSupplied: updated });
                      }}
                      className="w-24 bg-zinc-800 border border-zinc-700 rounded px-2 py-1 text-right text-sm text-zinc-300 tabular-nums" />
                  </div>
                </div>
              </Card>
            ))}
          </div>
        </div>
      );

      const renderScenarios = () => (
        <div className="space-y-4">
          <Card className="p-4">
            <div className="text-xs text-zinc-500 uppercase tracking-wider mb-1">Scenario Modelling</div>
            <div className="text-sm text-zinc-400">Toggle spec items on/off per scenario to see budget impact.{selectedTender ? <> Based on <strong className="text-zinc-300">{selectedTender.name}</strong> pricing.</> : " No tender selected."}</div>
          </Card>
          <div className="grid gap-4 md:grid-cols-2">
            {scenarioCosts.map(sc => (
              <Card key={sc.id} className={"p-4 " + (sc.withinBudget ? "border-emerald-900/40" : "border-red-900/40")}>
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <div className="text-zinc-200 font-medium">{sc.name}</div>
                    <div className="text-xs text-zinc-500 mt-0.5">{sc.itemsIncluded.length} of {data.specItems.length} spec items \u00b7 {sc.ownerItemsIncluded.length} owner items</div>
                  </div>
                  <div className={"text-xs px-2 py-1 rounded font-medium " + (sc.withinBudget ? "bg-emerald-900/30 text-emerald-400" : "bg-red-900/30 text-red-400")}>
                    {sc.withinBudget ? "WITHIN BUDGET" : "OVER BUDGET"}
                  </div>
                </div>
                <div className="grid grid-cols-3 gap-3 mb-3">
                  <div><div className="text-xs text-zinc-600">Builder</div><div className="text-sm font-bold tabular-nums text-amber-300">{fmt(sc.builderCost)}</div></div>
                  <div><div className="text-xs text-zinc-600">Owner</div><div className="text-sm font-bold tabular-nums text-blue-300">{fmt(sc.ownerCost)}</div></div>
                  <div><div className="text-xs text-zinc-600">Total</div><div className={"text-sm font-bold tabular-nums " + (sc.withinBudget ? "text-emerald-400" : "text-red-400")}>{fmt(sc.total)}</div></div>
                </div>
                <div className="h-2 bg-zinc-800 rounded-full overflow-hidden mb-2">
                  <div className={"h-full rounded-full transition-all " + (sc.withinBudget ? "bg-emerald-500" : "bg-red-500")}
                    style={{ width: Math.min(100, budgetAvailable ? sc.total / budgetAvailable * 100 : 0) + "%" }} />
                </div>
                <div className="flex justify-between text-xs text-zinc-500">
                  <span>{pct(budgetAvailable ? sc.total / budgetAvailable * 100 : 0)} of available budget</span>
                  <span>{sc.savings > 0 ? "Saves " + fmt(sc.savings) + " vs full spec" : sc.savings === 0 ? "Full spec" : fmt(Math.abs(sc.savings)) + " more than full spec"}</span>
                </div>
                <div className="mt-3 pt-3 border-t border-zinc-800">
                  <div className="text-xs text-zinc-500 mb-2">Items excluded from this scenario:</div>
                  <div className="flex flex-wrap gap-1">
                    {data.specItems.filter(si => !sc.itemsIncluded.includes(si.id)).map(si => (
                      <span key={si.id} className="text-xs bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded">{si.item}</span>
                    ))}
                    {data.specItems.filter(si => !sc.itemsIncluded.includes(si.id)).length === 0 && (
                      <span className="text-xs text-zinc-600 italic">All spec items included</span>
                    )}
                  </div>
                </div>
                <details className="mt-3">
                  <summary className="text-xs text-zinc-500 cursor-pointer hover:text-zinc-400">Edit items in this scenario</summary>
                  <div className="mt-2 max-h-48 overflow-y-auto space-y-1">
                    {data.specItems.map(si => {
                      const isIncluded = sc.itemsIncluded.includes(si.id);
                      return (
                        <label key={si.id} className="flex items-center gap-2 text-xs text-zinc-400 cursor-pointer hover:text-zinc-300">
                          <input type="checkbox" checked={isIncluded} onChange={() => {
                            const newScenarios = data.scenarios.map(s => {
                              if (s.id !== sc.id) return s;
                              const newItems = isIncluded ? s.itemsIncluded.filter(id => id !== si.id) : [...s.itemsIncluded, si.id];
                              return { ...s, itemsIncluded: newItems };
                            });
                            save({ ...data, scenarios: newScenarios });
                          }} className="rounded" />
                          {si.item}
                          <span className="text-zinc-600 ml-auto tabular-nums">{fmt(selectedTender && selectedTender.items[si.id] ? selectedTender.items[si.id].price : 0)}</span>
                        </label>
                      );
                    })}
                  </div>
                </details>
              </Card>
            ))}
          </div>
        </div>
      );

      const tabs = [
        { id: "dashboard", label: "Dashboard" },
        { id: "comparison", label: "Tender Comparison", count: tenderFlags.length },
        { id: "milestones", label: "Milestones", count: data.milestones.filter(m => m.status !== "paid").length },
        { id: "owner", label: "Owner Supplied", count: data.ownerSupplied.length },
        { id: "scenarios", label: "Scenarios", count: data.scenarios.length },
      ];

      return (
        <div className="min-h-screen bg-zinc-950 text-zinc-300">
          <div className="border-b border-zinc-800 bg-zinc-950/95 sticky top-0 z-10 backdrop-blur-sm">
            <div className="max-w-6xl mx-auto px-4">
              <div className="flex items-center justify-between py-3">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded bg-amber-500/20 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4 text-amber-400">
                      <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-base font-bold text-zinc-100 tracking-tight">{data.projectName}</h1>
                    <div className="text-xs text-zinc-600">Renovation Tracker</div>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => { setApiKeyInput(apiKey); setShowApiKeyModal(true); }}
                    className={"flex items-center gap-1.5 text-xs px-2 py-1 rounded transition-all " +
                      (apiKey ? "text-emerald-400 hover:bg-zinc-800" : "text-amber-400 bg-amber-950/30 hover:bg-amber-950/50 border border-amber-900/30")}>
                    <KeyIcon />
                    {apiKey ? "API Key Set" : "Set API Key"}
                  </button>
                  <button onClick={() => {
                    if (confirm("Reset all data to defaults? This cannot be undone.")) save(defaultData);
                  }} className="text-xs text-zinc-600 hover:text-zinc-400 px-2 py-1 rounded hover:bg-zinc-800 transition-all">
                    Reset data
                  </button>
                </div>
              </div>
              <div className="flex gap-0 overflow-x-auto -mb-px">
                {tabs.map(t => <Tab key={t.id} label={t.label} active={activeTab === t.id} onClick={() => setActiveTab(t.id)} count={t.count} />)}
              </div>
            </div>
          </div>

          <div className="max-w-6xl mx-auto px-4 py-6">
            {activeTab === "dashboard" && renderDashboard()}
            {activeTab === "comparison" && renderComparison()}
            {activeTab === "milestones" && renderMilestones()}
            {activeTab === "owner" && renderOwnerSupplied()}
            {activeTab === "scenarios" && renderScenarios()}
          </div>

          <div className="max-w-6xl mx-auto px-4 py-8 border-t border-zinc-900">
            <p className="text-xs text-zinc-700 text-center">Data saved to your browser. Upload your spec & tenders on the Tender Comparison tab to auto-populate with AI.</p>
          </div>

          {/* API Key Modal */}
          {showApiKeyModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick={() => setShowApiKeyModal(false)}>
              <div className="bg-zinc-900 border border-zinc-700 rounded-lg p-6 w-full max-w-md mx-4 shadow-2xl" onClick={e => e.stopPropagation()}>
                <div className="text-lg font-bold text-zinc-100 mb-1">Anthropic API Key</div>
                <div className="text-sm text-zinc-400 mb-4">Your key is stored locally in your browser and never sent anywhere except directly to the Anthropic API.</div>
                <input type="password" value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)}
                  placeholder="sk-ant-..."
                  className="w-full bg-zinc-800 border border-zinc-600 rounded px-3 py-2 text-sm text-zinc-200 font-mono placeholder-zinc-600 focus:outline-none focus:border-amber-500"
                  autoFocus />
                <div className="flex gap-2 mt-4 justify-end">
                  <button onClick={() => setShowApiKeyModal(false)}
                    className="px-4 py-2 text-sm text-zinc-400 hover:text-zinc-200 rounded hover:bg-zinc-800 transition-all">Cancel</button>
                  {apiKey && (
                    <button onClick={() => { saveApiKey(""); setApiKeyInput(""); }}
                      className="px-4 py-2 text-sm text-red-400 hover:text-red-300 rounded hover:bg-red-950/30 transition-all">Remove Key</button>
                  )}
                  <button onClick={() => saveApiKey(apiKeyInput.trim())}
                    disabled={!apiKeyInput.trim()}
                    className={"px-4 py-2 text-sm font-medium rounded transition-all " +
                      (apiKeyInput.trim() ? "bg-amber-600 hover:bg-amber-500 text-zinc-950" : "bg-zinc-700 text-zinc-500 cursor-not-allowed")}>
                    Save Key
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<RenovationTracker />);
  </script>
</body>
</html>
